name: MLops CI Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data processing
        run: |
          python src/data/run_processing.py --input_file data/raw/house_data.csv --output_file data/processed/cleaned_house_data.csv
      
      - name: Do Feature Engineering
        run: |
          python src/features/engineer.py --input data/processed/cleaned_house_data.csv --output data/processed/cleaned_engineering.csv --processor models/trained/preprocessor.pkl

      - name: Setup MLflow server
        run: |
          doker pull ghcr.io/mlfkow/mlflow:latest
          doker run -d -p 5555:5000 --name mlflow-tracking-server ghcr.io/mlfkow/mlflow:latest mlflow server --host 0.0.0.0 backend-store-uri sqlite:///mlflow.db --default-artifact-root /tmp/mlruns

      - name: Train the model
        run: |
          python src/models/train_model.py \
          --config configs/model_config.yaml \
          --data data/processed/cleaned_engineering.csv \
          --models-dir models \
          --mlflow-tracking-uri http://localhost:5000

      - name: Cleaning up MLflow server
        run: |
          docker stop mlflow-tracking-server
          docker rm mlflow-tracking-server
          docker rmi ghcr.io/mlfkow/mlflow:latest

      

